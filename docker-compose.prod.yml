services:
  backend:
    image: ghcr.io/tomvietcode/ioc-backend:latest
    container_name: ioc-backend
    ports:
      - "3002:3000" # Maps container's port 3000 to VPS port 3002 (since host port 3000 is occupied)
    environment:
      PORT: 3000
      NODE_ENV: production
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASS: ${DB_PASS}
      DB_NAME: ${DB_NAME}
      DB_SSL: ${DB_SSL}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRATION: ${JWT_ACCESS_EXPIRATION}
      JWT_REFRESH_EXPIRATION: ${JWT_REFRESH_EXPIRATION}
      CORS_ORIGIN: ${CORS_ORIGIN}
      # File Storage configuration
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      # Payment gateway configuration
      VNPAY_TMN_CODE: ${VNPAY_TMN_CODE}
      VNPAY_SECURE_SECRET: ${VNPAY_SECURE_SECRET}
      VNPAY_RETURN_URL: ${VNPAY_RETURN_URL}

      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      MAIL_USER: ${MAIL_USER}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
    restart: always

  frontend:
    image: ghcr.io/tomvietcode/ioc-frontend:latest
    container_name: ioc-frontend
    ports:
      - "3001:3000" # Maps container's port 3000 to VPS port 3001 (or another free port like 8080)
    environment:
      PORT: 3000
      NODE_ENV: production
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_TRUST_HOST: "true" # Solves the UntrustedHost error for NextAuth behind Nginx
      # NEXT_PUBLIC_API_URL is baked as /api at build-time in GitHub Actions.
      # Routing to backend (port 3002) is handled by reverse proxy (Nginx/Caddy) via the /api path.
    restart: always

