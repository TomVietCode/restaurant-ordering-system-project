name: Build and Push Backend Docker image to GHCR

on:
  push:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: ./code/backend
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/restaurant-ordering-system-project-backend:latest
            ghcr.io/${{ github.repository_owner }}/restaurant-ordering-system-project-backend:${{ github.sha }}

      - name: Output image name
        run: echo "Image pushed: ghcr.io/${{ github.repository_owner }}/restaurant-ordering-system-project-backend:latest"
