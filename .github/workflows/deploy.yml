name: CI/CD

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read
  packages: write

jobs:
  build-backend:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Backend Image
        uses: docker/build-push-action@v4
        with:
          context: ./code/backend
          push: true
          tags: |
            ghcr.io/tomvietcode/ioc-backend:latest
            ghcr.io/tomvietcode/ioc-backend:${{ github.ref_name }}

  build-frontend:
    name: Build & Push Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./code/frontend/web-admin
          file: ./code/frontend/web-admin/Dockerfile
          push: true
          tags: |
            ghcr.io/tomvietcode/ioc-frontend:latest
            ghcr.io/tomvietcode/ioc-frontend:${{ github.ref_name }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}

  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate .env file
        run: |
          cat <<EOF > .env.prod
          # --- DATABASE CONFIG ---
          DB_HOST=${{ secrets.DB_HOST }}
          DB_PORT=${{ secrets.DB_PORT }}
          DB_USER=${{ secrets.DB_USER }}
          DB_PASS=${{ secrets.DB_PASS }}
          DB_NAME=${{ secrets.DB_NAME }}
          DB_SSL=${{ secrets.DB_SSL }}

          # --- BACKEND SECURITY CONFIG ---
          JWT_ACCESS_SECRET=${{ secrets.JWT_ACCESS_SECRET }}
          JWT_REFRESH_SECRET=${{ secrets.JWT_REFRESH_SECRET }}
          JWT_ACCESS_EXPIRATION=${{ secrets.JWT_ACCESS_EXPIRATION }}
          JWT_REFRESH_EXPIRATION=${{ secrets.JWT_REFRESH_EXPIRATION }}

          # --- CORS CONFIG ---
          CORS_ORIGIN=${{ secrets.CORS_ORIGIN }}

          # --- STORAGE CONFIG (S3 / DigitalOcean Spaces) ---
          S3_ENDPOINT=${{ secrets.S3_ENDPOINT }}
          S3_BUCKET=${{ secrets.S3_BUCKET }}
          S3_ACCESS_KEY=${{ secrets.S3_ACCESS_KEY }}
          S3_SECRET_KEY=${{ secrets.S3_SECRET_KEY }}
          S3_REGION=${{ secrets.S3_REGION }}

          # --- VNPAY CONFIG ---
          VNPAY_TMN_CODE=${{ secrets.VNPAY_TMN_CODE }}
          VNPAY_SECURE_SECRET=${{ secrets.VNPAY_SECURE_SECRET }}
          VNPAY_RETURN_URL=${{ secrets.VNPAY_RETURN_URL }}

          # --- SEED DEFAULT ADMIN CONFIG ---
          SEED_ADMIN_EMAIL=${{ secrets.SEED_ADMIN_EMAIL }}
          SEED_ADMIN_PASSWORD=${{ secrets.SEED_ADMIN_PASSWORD }}

          # --- EMAIL CONFIG ---
          MAIL_HOST=${{ secrets.MAIL_HOST }}
          MAIL_PORT=${{ secrets.MAIL_PORT }}
          MAIL_FROM=${{ secrets.MAIL_FROM }}
          MAIL_USER=${{ secrets.MAIL_USER }}
          MAIL_PASS=${{ secrets.MAIL_PASS }}

          # --- FRONTEND AUTH CONFIG ---
          AUTH_SECRET=${{ secrets.AUTH_SECRET }}
          AUTH_TRUST_HOST=${{ secrets.AUTH_TRUST_HOST }}
          EOF

      - name: Copy files to VPS via SCP
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          source: "docker-compose.prod.yml,.env.prod"
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          overwrite: true

      - name: SSH to VPS and Deploy Application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_SSH_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_SSH_PORT || 22 }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            # change name .env.prod to .env
            mv .env.prod .env
            
            # login to GHCR on VPS using temporary token from pipeline
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # pull new images
            docker compose -f docker-compose.prod.yml pull
            
            # start/update containers
            docker compose -f docker-compose.prod.yml up -d
            
            # remove old images
            docker image prune -f
