services:
  postgres:
    image: postgres:latest
    container_name: postgres_container
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}  
      POSTGRES_PASSWORD: ${DB_PASS}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
  backend:
    build: .
    container_name: backend_container
    restart: always
    env_file:
      - ./.env 
    ports:
      - ${PORT}:${PORT}
    depends_on:
      - postgres

volumes:
  pgdata:

networks:
  default:
    name: restaurant-ordering-network